<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>国試過去問演習ツール</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app-container">

    <!-- 1. メニュー画面 -->
    <section id="menu-screen" class="active">
      <header class="main-header">
        <h1>国試過去問演習</h1>
        <p class="subtitle">第23回 〜 第32回 対応</p>
      </header>

      <!-- 全体の学習進捗エリア -->
      <div class="card progress-card">
        <h3>全体の学習進捗</h3>
        <div class="progress-info">
          <span>解いた問題: <strong id="progress-count">0</strong> / 1680 問</span>
          <span id="progress-percentage">0%</span>
        </div>
        <div class="progress-bar-container">
          <div id="progress-bar-fill" style="width: 0%;"></div>
        </div>
        <div class="incorrect-summary">
          <span>現在間違えている問題: <strong id="incorrect-count">0</strong> 問</span>
        </div>
      </div>

      <!-- 条件設定フォーム -->
      <div class="card form-card">
        <h3>出題条件を設定</h3>

        <!-- ① 科目選択（ボタン式） -->
        <div class="form-group">
          <label>科目</label>
          <div id="subject-buttons" class="button-group">
            <button type="button" class="toggle-btn" data-value="incorrect">【復習】間違えた問題のみ</button>
            <button type="button" class="toggle-btn" data-value="all_subjects">すべての科目</button>
            
            <div class="group-label">専門基礎科目</div>
            <button type="button" class="toggle-btn" data-value="introduction">医療概論</button>
            <button type="button" class="toggle-btn" data-value="hygiene">衛生学・公衆衛生学</button>
            <button type="button" class="toggle-btn" data-value="laws">関係法規</button>
            <button type="button" class="toggle-btn" data-value="anatomy">解剖学</button>
            <button type="button" class="toggle-btn" data-value="physiology">生理学</button>
            <button type="button" class="toggle-btn" data-value="pathology">病理学概論</button>
            <button type="button" class="toggle-btn" data-value="clinical_general">臨床医学総論</button>
            <button type="button" class="toggle-btn" data-value="clinical_special">臨床医学各論</button>
            <button type="button" class="toggle-btn" data-value="rehab">リハビリテーション</button>

            <div class="group-label">専門科目</div>
            <button type="button" class="toggle-btn" data-value="oriental_intro">東洋医学概論</button>
            <button type="button" class="toggle-btn" data-value="meridian">経絡経穴概論</button>
            <button type="button" class="toggle-btn" data-value="oriental_clinical">東洋医学臨床論</button>
            <button type="button" class="toggle-btn" data-value="acupuncture">はり理論</button>
            <button type="button" class="toggle-btn" data-value="moxibustion">きゅう理論</button>
          </div>
        </div>

        <!-- ② 大項目選択（ボタン式：JSで動的生成） -->
        <div class="form-group" id="category-wrapper" style="display: none;">
          <label>大項目（カテゴリ）</label>
          <div id="category-buttons" class="button-group">
            <!-- JavaScriptでここにボタンが追加されます -->
          </div>
        </div>

        <!-- ③ 試験の回数と問題数はセレクトボックスのまま（数が多いため） -->
        <div class="form-group">
          <label for="select-round">試験の回</label>
          <select id="select-round">
            <option value="all">すべての回</option>
            <option value="23">第23回</option>
            <option value="24">第24回</option>
            <option value="25">第25回</option>
            <option value="26">第26回</option>
            <option value="27">第27回</option>
            <option value="28">第28回</option>
            <option value="29">第29回</option>
            <option value="30">第30回</option>
            <option value="31">第31回</option>
            <option value="32">第32回</option>
          </select>
        </div>

        <div class="form-group">
          <label for="select-count">出題問題数</label>
          <select id="select-count">
            <option value="10">10問</option>
            <option value="20">20問</option>
            <option value="50">50問</option>
            <option value="all">条件にあう全問</option>
          </select>
        </div>

        <button id="btn-start" class="btn btn-primary" disabled>学習スタート</button>
      </div>
    </section>

    <!-- 2. 問題解答画面 -->
    <section id="quiz-screen" style="display: none;">
      <div class="quiz-header">
        <span id="quiz-progress-text">1 / 10 問目</span>
        <button id="btn-quit" class="btn btn-secondary-small">中断する</button>
      </div>

      <div class="card quiz-card">
        <div class="tag-container">
          <span id="quiz-tag-subject" class="tag tag-blue">科目名</span>
          <span id="quiz-tag-category" class="tag tag-gray">カテゴリ名</span>
          <span id="quiz-tag-round" class="tag tag-gray">回数</span>
        </div>
        <div id="quiz-question" class="question-text">問題文</div>
        <div id="quiz-options" class="options-container"></div>

        <div id="quiz-feedback" style="display: none;">
          <hr class="divider">
          <div id="feedback-status" class="feedback-correct"></div>
          <div class="explanation-box">
            <h4>【解説】</h4>
            <p id="quiz-explanation"></p>
          </div>
          <button id="btn-next" class="btn btn-primary">次の問題へ</button>
        </div>
      </div>
    </section>

    <!-- 3. 結果表示画面 -->
    <section id="result-screen" style="display: none;">
      <header class="main-header">
        <h1>演習終了</h1>
      </header>
      <div class="card result-card">
        <h2>今回の結果</h2>
        <div class="result-score-box">
          <span id="result-score">0 / 0</span>
          <p class="score-label">正解数</p>
        </div>
        <p id="result-message" class="result-message"></p>
      </div>
      <button id="btn-to-menu" class="btn btn-primary">メニューに戻る</button>
    </section>

  </div>
  <script src="app.js"></script>
</body>
</html>
